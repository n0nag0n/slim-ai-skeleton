services:
  app:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - .:/app
    environment:
      - DB_DRIVER=${DB_DRIVER:-pdo_sqlite}
      - DB_PATH=${DB_PATH:-var/database.sqlite}

